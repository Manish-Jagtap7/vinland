<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vinland — Build. Deploy. Scale. A next-generation cloud platform launching soon." />
  <title>Vinland — Coming Soon</title>

  <!-- Favicon placeholder (SVG inline) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0f'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='38' font-family='monospace' fill='%236366f1'%3EV%3C/text%3E%3C/svg%3E" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design Tokens ──────────────────────────────────── */
    :root {
      --bg:        #05050d;
      --surface:   rgba(255,255,255,0.035);
      --border:    rgba(255,255,255,0.08);
      --accent1:   #6366f1;   /* indigo */
      --accent2:   #8b5cf6;   /* violet */
      --accent3:   #06b6d4;   /* cyan  */
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
      --radius:    16px;
      --glow:      0 0 60px rgba(99,102,241,0.18), 0 0 120px rgba(139,92,246,0.10);
    }

    /* ─── Base ───────────────────────────────────────────── */
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ─── Animated Gradient Background ──────────────────── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(139,92,246,0.11) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 40%, rgba(6,182,212,0.07) 0%, transparent 70%),
        var(--bg);
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(15deg) brightness(1.04); }
      100% { filter: hue-rotate(-10deg) brightness(0.97); }
    }

    /* ─── Particle Canvas ────────────────────────────────── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ─── Grid overlay ───────────────────────────────────── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
    }

    /* ─── Main Layout ────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 10;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 0;
    }

    /* ─── Status Badge ───────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent1);
      margin-bottom: 36px;
      animation: fadeInDown 0.8s ease both;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 8px var(--accent3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.75); }
    }

    /* ─── Hero Card ──────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 52px 48px;
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      box-shadow:
        var(--glow),
        inset 0 1px 0 rgba(255,255,255,0.06);
      text-align: center;
      animation: fadeInUp 0.9s cubic-bezier(.22,1,.36,1) 0.1s both;
      position: relative;
      overflow: hidden;
    }

    /* subtle inner shimmer */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      border-radius: inherit;
      pointer-events: none;
    }

    /* ─── Logo / Title ───────────────────────────────────── */
    .logo-img {
      width: clamp(180px, 40vw, 320px);
      height: auto;
      object-fit: contain;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(52px, 10vw, 80px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.75) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      animation: none;
    }

    .subtitle {
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .subtitle span {
      color: var(--accent3);
    }

    .launch-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 40px;
      letter-spacing: 0.04em;
    }

    /* ─── Divider ────────────────────────────────────────── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 0 36px;
    }

    /* ─── Terminal Block ─────────────────────────────────── */
    .terminal {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: left;
      font-family: var(--mono);
      font-size: 12.5px;
      color: #94a3b8;
      line-height: 1.9;
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }

    .terminal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      opacity: 0.6;
    }

    .terminal-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f56; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #27c93f; }

    .terminal-line {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .terminal-line.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .terminal-prompt { color: var(--accent1); user-select: none; }

    .terminal-text { color: #cbd5e1; }

    .terminal-line.highlight .terminal-text {
      color: var(--accent3);
      font-weight: 500;
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--accent1);
      border-radius: 1px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 3px;
      opacity: 0;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── Email Form ─────────────────────────────────────── */


    /* ─── Footer ─────────────────────────────────────────── */
    .footer {
      margin-top: 32px;
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.05em;
      animation: fadeIn 1.2s ease 1.2s both;
    }

    .footer a {
      color: var(--accent1);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .footer a:hover { opacity: 1; }

    /* ─── Floating Orbs ──────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat linear infinite;
    }
    .orb1 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
      top: -60px; left: -80px;
      animation-duration: 20s;
    }
    .orb2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(139,92,246,0.18), transparent 70%);
      bottom: -40px; right: -60px;
      animation-duration: 25s; animation-delay: -8s;
    }
    .orb3 {
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(6,182,212,0.14), transparent 70%);
      top: 50%; left: 50%;
      animation-duration: 30s; animation-delay: -15s;
    }

    @keyframes orbFloat {
      0%   { transform: translate(0,0) scale(1); }
      25%  { transform: translate(30px,-20px) scale(1.05); }
      50%  { transform: translate(0, 30px) scale(0.95); }
      75%  { transform: translate(-25px, 10px) scale(1.02); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ─── Animations ─────────────────────────────────────── */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── Responsive ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .card { padding: 36px 24px 32px; border-radius: 18px; }
      .notify-form { flex-direction: column; }
      .notify-btn { width: 100%; padding: 13px; }
      .terminal { font-size: 11.5px; padding: 16px 18px; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>
  <canvas id="particles"></canvas>

  <!-- Floating orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Main content -->
  <main class="page">
    <div class="status-badge">
      <span class="status-dot"></span>
      Private Beta · 2026
    </div>

    <div class="card">
      <img class="logo-img" src="https://i.ibb.co/zTyGnW9f/vinland.png" alt="Vinland logo" />

      <h1>Vinland</h1>

      <p class="subtitle">
        <span>Build.</span>
        &nbsp;<span>Deploy.</span>
        &nbsp;<span>Scale.</span>
      </p>
      <p class="launch-label">Launching soon &mdash; the platform for the next era of infrastructure.</p>

      <div class="divider"></div>

      <!-- Terminal -->
      <div class="terminal" id="terminal" aria-label="Terminal output">
        <div class="terminal-dots">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
        </div>
        <div class="terminal-line" id="line1">
          <span class="terminal-prompt">$</span>
          <span class="terminal-text">initializing infrastructure...</span>
        </div>
        <div class="terminal-line" id="line2">
          <span class="terminal-prompt">$</span>
          <span class="terminal-text">provisioning nodes <span class="muted">[1/3]</span>...</span>
        </div>
        <div class="terminal-line" id="line3">
          <span class="terminal-prompt">$</span>
          <span class="terminal-text">configuring edge network...</span>
        </div>
        <div class="terminal-line highlight" id="line4">
          <span class="terminal-prompt">→</span>
          <span class="terminal-text">vinland coming online</span>
          <span class="cursor" id="cursor"></span>
        </div>
      </div>


    </div>

    <footer class="footer">
      &copy; 2026 Vinland, Inc. &nbsp;·&nbsp; All rights reserved.
    </footer>
  </main>

  <script>
    /* ═══════════════════════════════════════════
       Particle system
    ═══════════════════════════════════════════ */
    (function initParticles() {
      const canvas = document.getElementById('particles');
      const ctx    = canvas.getContext('2d');

      let W, H, particles = [];

      const COLORS = ['rgba(99,102,241,', 'rgba(139,92,246,', 'rgba(6,182,212,'];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticle() {
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        return {
          x:     Math.random() * W,
          y:     Math.random() * H,
          r:     Math.random() * 1.4 + 0.4,
          vx:    (Math.random() - 0.5) * 0.25,
          vy:    (Math.random() - 0.5) * 0.25,
          alpha: Math.random() * 0.5 + 0.1,
          color,
        };
      }

      function init() {
        resize();
        const count = Math.min(Math.floor((W * H) / 9000), 120);
        particles = Array.from({ length: count }, createParticle);
      }

      function tick() {
        ctx.clearRect(0, 0, W, H);

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H;
          if (p.y > H) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `${p.color}${p.alpha})`;
          ctx.fill();
        }

        // Draw faint connecting lines between close particles
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 110) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              const a = (1 - dist / 110) * 0.06;
              ctx.strokeStyle = `rgba(99,102,241,${a})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(tick);
      }

      window.addEventListener('resize', () => { resize(); });
      init();
      tick();
    })();

    /* ═══════════════════════════════════════════
       Terminal animation
    ═══════════════════════════════════════════ */
    (function initTerminal() {
      const lines  = ['line1','line2','line3','line4'];
      const cursor = document.getElementById('cursor');
      const delays = [400, 1100, 1900, 2800];

      cursor.style.opacity = '0';

      lines.forEach((id, i) => {
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.classList.add('visible');
          if (i === lines.length - 1) {
            cursor.style.opacity = '1';
          }
        }, delays[i]);
      });

      // Re-run terminal loop every ~12s
      function restartLoop() {
        const allLines = lines.map(id => document.getElementById(id));
        cursor.style.opacity = '0';
        allLines.forEach(el => { if (el) el.classList.remove('visible'); });

        allLines.forEach((el, i) => {
          setTimeout(() => {
            if (el) el.classList.add('visible');
            if (i === lines.length - 1) cursor.style.opacity = '1';
          }, delays[i]);
        });
      }

      setInterval(restartLoop, 12000);
    })();


  </script>
</body>
</html>
